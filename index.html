<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrustIQ Fraud Engine - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #020617;
            color: #f8fafc;
            margin: 0;
            overflow: hidden;
        }
        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #0f172a;
        }
        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }
        
        /* Neon Blinking Animations */
        @keyframes neon-pulse-amber {
            0%, 100% { 
                outline: 2px solid rgba(245, 158, 11, 0.1); 
                box-shadow: inset 0 0 5px rgba(245, 158, 11, 0);
            }
            50% { 
                outline: 2px solid rgba(245, 158, 11, 1); 
                box-shadow: inset 0 0 20px rgba(245, 158, 11, 0.2);
            }
        }
        
        @keyframes neon-pulse-red {
            0%, 100% { 
                outline: 2px solid rgba(239, 68, 68, 0.1); 
                box-shadow: inset 0 0 10px rgba(239, 68, 68, 0);
            }
            50% { 
                outline: 2px solid rgba(239, 68, 68, 1); 
                box-shadow: inset 0 0 30px rgba(239, 68, 68, 0.4);
            }
        }

        .animate-blink-pending {
            animation: neon-pulse-amber 2s infinite;
            outline-offset: -2px;
            background-color: rgba(245, 158, 11, 0.02);
        }

        .animate-blink-critical {
            animation: neon-pulse-red 1s infinite;
            outline-offset: -2px;
            background-color: rgba(239, 68, 68, 0.05);
        }

        @keyframes pulse-red {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .animate-pulse-red {
            animation: pulse-red 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
    </style>
